<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 운영 시스템 만들기</title>
  <script>
    if (localStorage.getItem("edu_ops_sidebar_collapsed") === "1") {
      document.documentElement.classList.add("sidebar-collapsed");
    }
  </script>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="목차 접기/펴기">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a class="brand" href="#">
        <span class="brand-mark" id="brand-mark">E</span>
        <span id="site-title">AI 운영 시스템 만들기</span>
      </a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <nav class="breadcrumb" id="breadcrumb" aria-label="breadcrumb"></nav>
      <article id="main-content"></article>
      <footer class="site-footer">
        교육 운영자를 위한 Claude Code/Codex 실습 가이드
      </footer>
    </main>
    <aside class="toc" id="toc-wrap">
      <div class="toc-sticky">
        <div class="toc-title">ON THIS PAGE</div>
        <ul class="toc-list" id="toc-list"></ul>
      </div>
    </aside>
  </div>

  <script src="config.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
